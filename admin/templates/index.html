<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiki's Kitchen Table</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  margin:0;
  background:#fafafa;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{
  margin:0;
  font-size:34px;
}

.subtitle{
  color:#666;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:28px;
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.product-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.product-image {
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: contain;
  background: #ffffff;
  padding: 10px;
  border-radius: 12px;
}

.product-body{
  padding:16px;
}

.product-label{
  font-size:12px;
  color:#999;
  margin-bottom:6px;
}

.product-title{
  margin:0 0 6px 0;
  font-size:18px;
}

.product-caption{
  font-size:14px;
  color:#444;
}

.product-cta-row{
  display:flex;
  justify-content:space-between;
  margin-top:12px;
}

.product-cta{
  text-decoration:none;
  font-weight:bold;
  color:#cc3366;
}

.product-meta{
  font-size:12px;
  color:#999;
}

</style>
</head>

<body>

<header>
<h1>Kiki's Kitchen Table</h1>
<div class="subtitle">Favorite kitchen finds and cozy cooking tools</div>
</header>

<div class="product-grid">

{% for product in products %}

<article class="product-card">

<a href="{{ product.amazon_url }}" target="_blank">
<img src="{{ product.image }}" class="product-image">
</a>

<div class="product-body">

<div class="product-label">{{ product.label }}</div>

{% if product.title %}
<h3 class="product-title">{{ product.title }}</h3>
{% endif %}

<p class="product-caption">
{{ product.caption }}
</p>

<div class="product-cta-row">

<a href="{{ product.amazon_url }}" class="product-cta" target="_blank">
View on Amazon →
</a>

<span class="product-meta">
{{ product.meta }}
</span>

</div>

</div>

</article>

{% endfor %}

</div>

</body>
</html>
